<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #7ec8e3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── рамка вокруг доски ───────────────────────────────────────────────── */
    #frame {
      position: relative;
      background: #3a4858;
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── доска ────────────────────────────────────────────────────────────── */
    #scene { position: relative; }

    #board {
      display: grid;
      grid-template-columns: repeat(6, 64px);
      grid-template-rows:    repeat(7, 64px);
      gap: 8px;
      padding: 16px;
      background: #3d4d60;
      border-radius: 18px;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.5);
    }

    .board-cell {
      background: #2e3d4e;
      border-radius: 8px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }

    /* ── стенки ───────────────────────────────────────────────────────────── */
    .wall {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: white;
      font-size: 22px;
      z-index: 30;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4),
                  inset 0 3px 0 rgba(255,255,255,0.3),
                  inset 0 -3px 0 rgba(0,0,0,0.2);
      pointer-events: none;
      user-select: none;
    }

    .wall.green  { background: #4caf50; }
    .wall.cyan   { background: #29b6f6; }
    .wall.purple { background: #c84bdf; }
    .wall { transition: transform 0.12s, filter 0.12s, box-shadow 0.12s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      65%     { transform: translateX(-4px); }
      85%     { transform: translateX(4px); }
    }
    .figure.shake { animation: shake 0.35s ease; }

    @keyframes jelly {
      0%   { transform: scale(1,    1   ); }
      18%  { transform: scale(1.13, 0.87); }
      38%  { transform: scale(0.9,  1.11); }
      56%  { transform: scale(1.07, 0.94); }
      72%  { transform: scale(0.97, 1.03); }
      86%  { transform: scale(1.02, 0.99); }
      100% { transform: scale(1,    1   ); }
    }
    .figure.jelly {
      animation: jelly 0.48s cubic-bezier(.36,.07,.19,.97);
      transform-origin: center bottom;
    }

    /* ── фигуры ───────────────────────────────────────────────────────────── */
    .figure {
      position: absolute;
      cursor: grab;
      z-index: 10;
      user-select: none;
      transition: transform 0.12s ease-out, filter 0.12s ease-out;
    }
    .figure.dragging {
      cursor: grabbing;
      z-index: 20;
      transform: scale(1.07) translateY(-6px);
    }
    .figure.returning {
      transition: left 0.2s cubic-bezier(.25,.8,.25,1),
                  top  0.2s cubic-bezier(.25,.8,.25,1),
                  transform 0.12s ease-out, filter 0.12s ease-out;
    }
    .figure canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }

    /* ── призрак на сетке ────────────────────────────────────────────────── */
    #ghost {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      transition: left 0.05s ease-out, top 0.05s ease-out;
    }
    #ghost canvas {
      position: absolute;
      top: 0; left: 0;
    }
  </style>
</head>
<body>
  <div id="frame">
    <div id="scene">
      <div id="board"></div>
    </div>
  </div>

  <script>
    const COLS = 6, ROWS = 7;
    const CELL = 64, GAP = 8, PAD = 16;

    // размеры доски
    const BOARD_W = COLS * CELL + (COLS - 1) * GAP + 2 * PAD; // 456
    const BOARD_H = ROWS * CELL + (ROWS - 1) * GAP + 2 * PAD; // 528

    // толщина рамки
    const BORDER = 54;

    // параметры стенки (3×1 клетки)
    const WALL_CELLS = 3;
    const WALL_LONG  = WALL_CELLS * CELL + (WALL_CELLS - 1) * GAP;  // 208
    const WALL_SHORT = 46;              // короткая сторона

    // ── позиционируем рамку и сцену ─────────────────────────────────────────
    const frame = document.getElementById('frame');
    const scene = document.getElementById('scene');

    frame.style.width  = (BOARD_W + 2 * BORDER) + 'px';
    frame.style.height = (BOARD_H + 2 * BORDER) + 'px';

    scene.style.position = 'absolute';
    scene.style.left = BORDER + 'px';
    scene.style.top  = BORDER + 'px';

    // соответствие цвета фигуры → цвет стенки
    const COLOR_KEY = {
      '#4caf50': 'green',  '#388e3c': 'green',  '#43a047': 'green',
      '#29b6f6': 'cyan',   '#00bcd4': 'cyan',   '#26c6da': 'cyan',
      '#c84bdf': 'purple', '#ab47bc': 'purple', '#e040fb': 'purple',
    };

    // ── строим стенки ───────────────────────────────────────────────────────
    const walls = [];
    function makeWall(colorKey, dir, col) {
      const el = document.createElement('div');
      el.className = `wall ${colorKey}`;
      el.textContent = { top: '▲', bottom: '▼', right: '▶', left: '◀' }[dir];
      el._colorKey = colorKey;
      el._dir      = dir;
      const horiz = dir === 'top' || dir === 'bottom';
      const w = horiz ? WALL_LONG  : WALL_SHORT;
      const h = horiz ? WALL_SHORT : WALL_LONG;
      el.style.width  = w + 'px';
      el.style.height = h + 'px';
      const offset = (BORDER - WALL_SHORT) / 2;
      const wallCol  = col !== undefined ? col : Math.floor((COLS - WALL_CELLS) / 2);
      const wallRow  = Math.floor((ROWS - WALL_CELLS) / 2);
      const wallLeft = BORDER + PAD + wallCol * (CELL + GAP);
      if (dir === 'top')    { el.style.left = wallLeft + 'px'; el.style.top    = offset + 'px'; el._startCell = wallCol; }
      if (dir === 'bottom') { el.style.left = wallLeft + 'px'; el.style.bottom = offset + 'px'; el._startCell = wallCol; }
      if (dir === 'right')  { el.style.top  = (BORDER + PAD + 3 * (CELL + GAP)) + 'px'; el.style.right  = offset + 'px'; el._startCell = 3; }
      if (dir === 'left')   { el.style.top  = (BORDER + PAD + wallRow * (CELL + GAP)) + 'px'; el.style.left   = offset + 'px'; el._startCell = wallRow; }
      frame.appendChild(el);
      walls.push(el);
    }

    makeWall('cyan',   'top');
    makeWall('purple', 'bottom', 0);

    // ── доска ────────────────────────────────────────────────────────────────
    const board = document.getElementById('board');
    for (let i = 0; i < COLS * ROWS; i++) {
      const d = document.createElement('div');
      d.className = 'board-cell';
      board.appendChild(d);
    }

    // ── логика фигур ─────────────────────────────────────────────────────────
    const SHAPES = {
      '1x1': [[0,0]],
      '2x1': [[0,0],[1,0]],
      '3x1': [[0,0],[1,0],[2,0]],
      '1x2': [[0,0],[0,1]],
      '1x3': [[0,0],[0,1],[0,2]],
      '1x4': [[0,0],[0,1],[0,2],[0,3]],
      '2x2': [[0,0],[1,0],[0,1],[1,1]],
      '3x4': [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2],[0,3],[1,3],[2,3]],
      'L':   [[0,0],[0,1],[0,2],[1,2]],
      'J':   [[1,0],[1,1],[0,2],[1,2]],
      'T':   [[0,0],[1,0],[2,0],[1,1]],
      'S':   [[1,0],[2,0],[0,1],[1,1]],
      'Z':   [[0,0],[1,0],[1,1],[2,1]],
      'fat_T': [[0,0],[1,0],[0,1],[1,1],[2,1],[0,2],[1,2]],
    };

    const occupied = new Map();

    function occupyCells(fig, col, row) {
      fig._cells.forEach(([dc, dr]) => occupied.set(`${col+dc},${row+dr}`, fig));
    }
    function freeCells(fig) {
      fig._cells.forEach(([dc, dr]) => occupied.delete(`${fig._col+dc},${fig._row+dr}`));
    }
    function canPlace(fig, col, row) {
      col = Math.max(0, Math.min(COLS - 1 - fig._maxC, col));
      row = Math.max(0, Math.min(ROWS - 1 - fig._maxR, row));
      return fig._cells.every(([dc, dr]) => {
        const v = occupied.get(`${col+dc},${row+dr}`);
        return !v || v === fig;
      });
    }
    function cellPos(col, row) {
      return { x: PAD + col * (CELL + GAP), y: PAD + row * (CELL + GAP) };
    }
    function placeFigure(fig, col, row, animate) {
      col = Math.max(0, Math.min(COLS - 1 - fig._maxC, col));
      row = Math.max(0, Math.min(ROWS - 1 - fig._maxR, row));
      const p = cellPos(col, row);
      if (animate) {
        fig.classList.add('returning');
        setTimeout(() => fig.classList.remove('returning'), 220);
      }
      fig.style.left = p.x + 'px';
      fig.style.top  = p.y + 'px';
      fig._col = col;
      fig._row = row;
    }
    // ── общий построитель path фигуры ───────────────────────────────────────
    function buildFigurePath(ctx, cells) {
      const set = new Set(cells.map(([c, r]) => `${c},${r}`));
      const has = (c, r) => set.has(`${c},${r}`);
      const R = 10;
      ctx.beginPath();
      cells.forEach(([dc, dr]) => {
        const x = dc * (CELL + GAP), y = dr * (CELL + GAP);
        const hasL = has(dc-1,dr), hasR = has(dc+1,dr);
        const hasT = has(dc,dr-1), hasB = has(dc,dr+1);
        const tl = (!hasL&&!hasT)?R:0, tr = (!hasR&&!hasT)?R:0;
        const br = (!hasR&&!hasB)?R:0, bl = (!hasL&&!hasB)?R:0;
        ctx.moveTo(x+tl, y);
        ctx.lineTo(x+CELL-tr, y);
        tr ? ctx.arcTo(x+CELL,y,      x+CELL,y+tr,    tr) : ctx.lineTo(x+CELL,y);
        ctx.lineTo(x+CELL, y+CELL-br);
        br ? ctx.arcTo(x+CELL,y+CELL, x+CELL-br,y+CELL,br) : ctx.lineTo(x+CELL,y+CELL);
        ctx.lineTo(x+bl, y+CELL);
        bl ? ctx.arcTo(x,y+CELL,      x,y+CELL-bl,    bl) : ctx.lineTo(x,y+CELL);
        ctx.lineTo(x, y+tl);
        tl ? ctx.arcTo(x,y,           x+tl,y,         tl) : ctx.lineTo(x,y);
        ctx.closePath();
        if (hasR) ctx.rect(x+CELL, y, GAP, CELL);
        if (hasB) ctx.rect(x, y+CELL, CELL, GAP);
        if (hasR && hasB && has(dc+1,dr+1)) ctx.rect(x+CELL, y+CELL, GAP, GAP);
      });
    }

    function prepCanvas(canvas, W, H) {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W+'px'; canvas.style.height = H+'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      return ctx;
    }

    // ── рисуем фигуру на canvas ──────────────────────────────────────────────
    function drawFigureCanvas(canvas, cells, color, W, H) {
      const ctx = prepCanvas(canvas, W, H);
      buildFigurePath(ctx, cells);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
      // блик сверху
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      const hl = ctx.createLinearGradient(0, 0, 0, H * 0.45);
      hl.addColorStop(0, 'rgba(255,255,255,0.32)');
      hl.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hl; ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // ── призрак (тень на сетке во время перетаскивания) ──────────────────────
    const ghostEl = document.createElement('div');
    ghostEl.id = 'ghost';
    ghostEl.style.display = 'none';
    scene.appendChild(ghostEl);
    let ghostCanvas = null;

    function showGhost(fig, col, row, valid) {
      const W = fig._maxC * (CELL + GAP) + CELL;
      const H = fig._maxR * (CELL + GAP) + CELL;
      ghostEl.style.width  = W + 'px';
      ghostEl.style.height = H + 'px';
      const p = cellPos(col, row);
      ghostEl.style.left = p.x + 'px';
      ghostEl.style.top  = p.y + 'px';

      if (!ghostCanvas) { ghostCanvas = document.createElement('canvas'); ghostEl.appendChild(ghostCanvas); }
      const ctx = prepCanvas(ghostCanvas, W, H);
      ctx.clearRect(0, 0, W, H);
      buildFigurePath(ctx, fig._cells);
      // заливка: белый (валидно) или красный (занято)
      ctx.fillStyle = valid ? 'rgba(255,255,255,0.22)' : 'rgba(255,60,60,0.28)';
      ctx.fill();
      // обводка
      ctx.strokeStyle = valid ? 'rgba(255,255,255,0.55)' : 'rgba(255,80,80,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ghostEl.style.display = 'block';
    }

    function hideGhost() { ghostEl.style.display = 'none'; }

    // ── система частиц ───────────────────────────────────────────────────────
    const pCanvas = document.createElement('canvas');
    pCanvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9999;';
    document.body.appendChild(pCanvas);
    const pctx = pCanvas.getContext('2d');
    let pDPR = 1;

    function resizePCanvas() {
      pDPR = window.devicePixelRatio || 1;
      pCanvas.width  = window.innerWidth  * pDPR;
      pCanvas.height = window.innerHeight * pDPR;
      pCanvas.style.width  = window.innerWidth  + 'px';
      pCanvas.style.height = window.innerHeight + 'px';
    }
    resizePCanvas();
    window.addEventListener('resize', resizePCanvas);

    let parts   = [];
    let pRafId  = null;

    function lightenHex(hex, amt) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
    }

    function spawnParticles(cx, cy, color) {
      const COUNT  = 52;
      const light  = lightenHex(color, 80);
      const colors = [color, color, color, light, light, '#ffffff'];
      for (let i = 0; i < COUNT; i++) {
        const angle = (Math.PI * 2 * i / COUNT) + (Math.random() - 0.5) * 0.9;
        const spd   = 1.8 + Math.random() * 8;
        parts.push({
          x:     cx + (Math.random() - 0.5) * 24,
          y:     cy + (Math.random() - 0.5) * 24,
          vx:    Math.cos(angle) * spd,
          vy:    Math.sin(angle) * spd - 2,
          size:  3.5 + Math.random() * 7.5,
          color: colors[Math.floor(Math.random() * colors.length)],
          op:    0.92 + Math.random() * 0.08,
          rot:   Math.random() * Math.PI * 2,
          rotV:  (Math.random() - 0.5) * 0.28,
          round: Math.random() > 0.42,
        });
      }
      if (!pRafId) tickParticles();
    }

    function tickParticles() {
      pctx.setTransform(pDPR, 0, 0, pDPR, 0, 0);
      pctx.clearRect(0, 0, pCanvas.width / pDPR, pCanvas.height / pDPR);
      parts = parts.filter(p => p.op > 0.015);
      parts.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.21;
        p.vx *= 0.979;
        p.op -= 0.019;
        p.rot += p.rotV;
        pctx.save();
        pctx.globalAlpha = Math.max(0, p.op);
        pctx.translate(p.x, p.y);
        pctx.rotate(p.rot);
        pctx.fillStyle = p.color;
        if (p.round) {
          pctx.beginPath();
          pctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
          pctx.fill();
        } else {
          pctx.fillRect(-p.size * 0.5, -p.size * 0.38, p.size, p.size * 0.76);
        }
        pctx.restore();
      });
      if (parts.length) {
        pRafId = requestAnimationFrame(tickParticles);
      } else {
        pRafId = null;
      }
    }

    function addJelly(fig) {
      fig.classList.add('jelly');
      fig.addEventListener('animationend', () => fig.classList.remove('jelly'), { once: true });
    }

    function createFigure(shapeName, color, startCol, startRow) {
      const cells = SHAPES[shapeName];
      const maxC  = Math.max(...cells.map(c => c[0]));
      const maxR  = Math.max(...cells.map(c => c[1]));
      const W = maxC * (CELL + GAP) + CELL;
      const H = maxR * (CELL + GAP) + CELL;

      const fig = document.createElement('div');
      fig.className    = 'figure';
      fig.style.width  = W + 'px';
      fig.style.height = H + 'px';
      fig._cells    = cells;
      fig._maxC     = maxC;
      fig._maxR     = maxR;
      fig._color    = color;
      fig._colorKey = COLOR_KEY[color] || null;

      const canvas = document.createElement('canvas');
      drawFigureCanvas(canvas, cells, color, W, H);
      fig.appendChild(canvas);

      scene.appendChild(fig);
      placeFigure(fig, startCol, startRow, false);
      occupyCells(fig, fig._col, fig._row);
      attachDrag(fig);
      return fig;
    }
    function attachDrag(fig) {
      fig.addEventListener('mousedown', (e) => {
        const prevCol = fig._col, prevRow = fig._row;
        let lastValidCol = prevCol, lastValidRow = prevRow;

        fig.classList.add('dragging');
        fig.style.zIndex = 20;
        // свечение своим цветом
        fig.style.filter = `drop-shadow(0 16px 24px rgba(0,0,0,0.55)) drop-shadow(0 0 18px ${fig._color}cc)`;
        const rect = fig.getBoundingClientRect();
        const grabX = e.clientX - rect.left;
        const grabY = e.clientY - rect.top;
        freeCells(fig);
        e.preventDefault();
        e.stopPropagation();

        const figW = fig._maxC * (CELL + GAP) + CELL;
        const figH = fig._maxR * (CELL + GAP) + CELL;

        // стенка срабатывает только когда мышь выходит за пределы доски
        function hoveredWall(rawX, rawY) {
          const beyond = {
            left:   rawX < 0,
            right:  rawX > BOARD_W - figW,
            top:    rawY < 0,
            bottom: rawY > BOARD_H - figH,
          };
          return walls.find(w => beyond[w._dir]) || null;
        }

        // фигура влезает в стенку, если её размер по нужной оси ≤ WALL_CELLS
        function fitsThroughWall(wall) {
          const horiz = wall._dir === 'top' || wall._dir === 'bottom';
          return horiz ? fig._maxC + 1 <= WALL_CELLS : fig._maxR + 1 <= WALL_CELLS;
        }

        // фигура стоит точно в пролёте стенки (ни одна клетка не вылезает за края)
        function alignedWithWall(wall) {
          const horiz = wall._dir === 'top' || wall._dir === 'bottom';
          if (horiz) {
            return lastValidCol >= wall._startCell &&
                   lastValidCol + fig._maxC <= wall._startCell + WALL_CELLS - 1;
          } else {
            return lastValidRow >= wall._startCell &&
                   lastValidRow + fig._maxR <= wall._startCell + WALL_CELLS - 1;
          }
        }

        // подсвечиваем стенки во время перетаскивания
        function updateWallHighlight(rawX, rawY) {
          const w = hoveredWall(rawX, rawY);
          walls.forEach(wall => {
            if (wall === w) {
              const match = fig._colorKey && fig._colorKey === wall._colorKey && fitsThroughWall(wall) && alignedWithWall(wall);
              wall.style.transform  = 'scale(1.1)';
              wall.style.filter     = match
                ? 'brightness(1.5) drop-shadow(0 0 14px rgba(255,255,255,0.9))'
                : 'brightness(0.55) saturate(0.3)';
            } else {
              wall.style.transform = '';
              wall.style.filter    = '';
            }
          });
          return w;
        }

        const onMove = (e) => {
          const sr   = scene.getBoundingClientRect();
          const rawX = e.clientX - sr.left - grabX;
          const rawY = e.clientY - sr.top  - grabY;

          const overWall = updateWallHighlight(rawX, rawY);
          if (overWall) {
            // фигура остаётся на последней валидной позиции
            const p = cellPos(lastValidCol, lastValidRow);
            fig.style.left = p.x + 'px';
            fig.style.top  = p.y + 'px';
            hideGhost();
            return;
          }

          // вычисляем целевую клетку
          const x = Math.max(0, Math.min(BOARD_W - figW, rawX));
          const y = Math.max(0, Math.min(BOARD_H - figH, rawY));
          const col = Math.round((x - PAD) / (CELL + GAP));
          const row = Math.round((y - PAD) / (CELL + GAP));
          const clampedCol = Math.max(0, Math.min(COLS - 1 - fig._maxC, col));
          const clampedRow = Math.max(0, Math.min(ROWS - 1 - fig._maxR, row));

          // двигаем фигуру только если клетки свободны
          if (canPlace(fig, clampedCol, clampedRow)) {
            lastValidCol = clampedCol;
            lastValidRow = clampedRow;
          }

          const p = cellPos(lastValidCol, lastValidRow);
          fig.style.left = p.x + 'px';
          fig.style.top  = p.y + 'px';
          showGhost(fig, lastValidCol, lastValidRow, true);
        };

        const onUp = (e) => {
          fig.classList.remove('dragging');
          fig.style.filter = '';
          fig.style.zIndex = 10;
          hideGhost();
          walls.forEach(w => { w.style.transform = ''; w.style.filter = ''; });
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);

          const sr2  = scene.getBoundingClientRect();
          const rawX = e.clientX - sr2.left - grabX;
          const rawY = e.clientY - sr2.top  - grabY;
          const wall = hoveredWall(rawX, rawY);
          if (wall) {
            const match = fig._colorKey && fig._colorKey === wall._colorKey && fitsThroughWall(wall) && alignedWithWall(wall);
            if (match) {
              // ── совпадение: вспышка + частицы + удаление ────────────────
              wall.style.transition = 'transform 0.15s, filter 0.15s';
              wall.style.transform  = 'scale(1.18)';
              wall.style.filter     = 'brightness(2) drop-shadow(0 0 18px white)';
              setTimeout(() => { wall.style.transform = ''; wall.style.filter = ''; }, 300);

              // центр фигуры в координатах вьюпорта → для партиклов
              const fr = fig.getBoundingClientRect();
              spawnParticles(fr.left + fr.width * 0.5, fr.top + fr.height * 0.5, fig._color);

              fig.style.transition = 'transform 0.15s ease-out, opacity 0.15s ease-in, filter 0.1s';
              fig.style.filter     = `brightness(4) drop-shadow(0 0 28px ${fig._color})`;
              fig.style.transform  = 'scale(1.15)';
              fig.style.opacity    = '0';
              setTimeout(() => fig.remove(), 180);
              // клетки уже свободны (freeCells вызван при mousedown)
            } else {
              // ── несовпадение: дрожание и возврат ────────────────────────
              placeFigure(fig, prevCol, prevRow, true);
              occupyCells(fig, fig._col, fig._row);
              fig.classList.add('shake');
              fig.addEventListener('animationend', () => fig.classList.remove('shake'), { once: true });
              setTimeout(() => addJelly(fig), 220);
            }
          } else {
            // дропаем на последнюю валидную позицию (всегда свободна)
            placeFigure(fig, lastValidCol, lastValidRow, false);
            addJelly(fig);
            occupyCells(fig, fig._col, fig._row);
          }
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });
    }

    // ── уровень ──────────────────────────────────────────────────────────────
    createFigure('3x4', '#c84bdf', 0, 2);
    createFigure('3x4', '#29b6f6', 3, 1);
  </script>
</body>
</html>
