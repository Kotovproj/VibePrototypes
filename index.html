<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Puzzle</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="frame">
    <div id="scene">
      <div id="board"></div>
    </div>
  </div>

  <!-- Level nav -->
  <div id="level-nav">
    <button class="nav-btn" id="prev-btn">◀</button>
    <span id="level-label">Level 1</span>
    <button class="nav-btn" id="next-btn">▶</button>
  </div>

  <!-- Back button -->
  <button class="nav-btn" id="back-btn">✕</button>

  <!-- Fade overlay -->
  <div id="fade-overlay"></div>
  <img id="tutorial-hand" src="tutor_hand.png" alt="" />
  <div id="start-overlay" style="display:none;">
    <div id="start-card">
      <h2 id="start-title">Well Done</h2>
      <div id="unlock-burst"></div>
      <div id="unlock-block" aria-hidden="true">
        <span class="stud"></span><span class="stud"></span>
        <span class="stud"></span><span class="stud"></span>
        <span class="stud"></span><span class="stud"></span>
        <span class="stud"></span><span class="stud"></span>
        <span class="arrow">↕</span>
      </div>
      <p id="start-subtitle">You have unlocked the <b>Arrow Block!</b></p>
      <p id="start-desc">Moves only in the given direction!</p>
      <button class="nav-btn" id="start-btn">CONTINUE</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="levels/level1.js"></script>
  <script src="levels/level2.js"></script>
  <script src="levels/level3.js"></script>
  <script src="levels/level4.js"></script>
  <script src="levels/level5.js"></script>
  <script src="levels/level6.js"></script>
  <script src="levels/level7.js"></script>
  <script src="levels/level8.js"></script>
  <script src="levels/level9.js"></script>
  <script src="levels/level10.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
