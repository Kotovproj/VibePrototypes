<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #scene {
      position: relative;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      padding: 20px;
      background: #4f5e73;
      border-radius: 16px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.5);
    }

    .cell {
      width: 80px;
      height: 80px;
      background: #6b7a8f;
      border-radius: 10px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), inset 0 -1px 2px rgba(255,255,255,0.05);
    }

    #figure {
      position: absolute;
      cursor: grab;
      z-index: 10;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 10px;
    }

    #figure.dragging {
      cursor: grabbing;
      opacity: 0.85;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="board"></div>
    <img id="figure" src="figure.png" draggable="false">
  </div>

  <script>
    const COLS    = 4;
    const ROWS    = 4;
    const CELL    = 80;   // px — размер клетки (совпадает с CSS)
    const GAP     = 12;   // px — совпадает с gap в CSS
    const PADDING = 20;   // px — совпадает с padding в CSS

    const FIG = CELL * 1.265;

    // --- строим клетки ---
    const board = document.getElementById('board');
    for (let i = 0; i < COLS * ROWS; i++) {
      board.appendChild(Object.assign(document.createElement('div'), { className: 'cell' }));
    }

    const figure = document.getElementById('figure');
    const scene  = document.getElementById('scene');

    figure.style.width  = FIG + 'px';
    figure.style.height = FIG + 'px';

    // --- позиционирование ---
    function cellPos(col, row) {
      return {
        x: PADDING + col * (CELL + GAP),
        y: PADDING + row * (CELL + GAP)
      };
    }

    function snapToCell(col, row) {
      col = Math.max(0, Math.min(COLS - 1, col));
      row = Math.max(0, Math.min(ROWS - 1, row));
      const p = cellPos(col, row);
      figure.style.left = (p.x - (FIG - CELL) / 2) + 'px';
      figure.style.top  = (p.y - (FIG - CELL) / 2) + 'px';
      figure._col = col;
      figure._row = row;
    }

    snapToCell(1, 1);

    // --- drag ---
    let dragging = false;
    let grabX = 0, grabY = 0;

    figure.addEventListener('mousedown', (e) => {
      dragging = true;
      figure.classList.add('dragging');
      const rect = figure.getBoundingClientRect();
      grabX = e.clientX - rect.left;
      grabY = e.clientY - rect.top;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const sr = scene.getBoundingClientRect();
      figure.style.left = (e.clientX - sr.left - grabX) + 'px';
      figure.style.top  = (e.clientY - sr.top  - grabY) + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      figure.classList.remove('dragging');

      const sr = scene.getBoundingClientRect();
      const cx = e.clientX - sr.left - grabX + FIG / 2;
      const cy = e.clientY - sr.top  - grabY + FIG / 2;

      const col = Math.round((cx - PADDING - CELL / 2) / (CELL + GAP));
      const row = Math.round((cy - PADDING - CELL / 2) / (CELL + GAP));

      snapToCell(col, row);
    });
  </script>
</body>
</html>
